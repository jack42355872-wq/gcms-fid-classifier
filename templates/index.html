<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GC-MS FID 成分分類工具 / GC-MS FID Classifier</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Segoe UI', Arial, sans-serif;
      background: #f0f4f8;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 40px 20px;
    }
    .lang-bar {
      position: fixed;
      top: 16px; right: 20px;
      display: flex;
      background: white;
      border-radius: 20px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.12);
      overflow: hidden;
      z-index: 100;
    }
    .lang-btn {
      padding: 6px 16px;
      border: none;
      background: transparent;
      font-size: 0.85rem;
      font-weight: 600;
      cursor: pointer;
      color: #718096;
      transition: all 0.2s;
    }
    .lang-btn.active {
      background: #3182ce;
      color: white;
      border-radius: 20px;
    }
    h1 { font-size: 1.8rem; color: #1a365d; margin-bottom: 8px; }
    .subtitle { color: #718096; margin-bottom: 40px; font-size: 0.95rem; }
    .card {
      background: white;
      border-radius: 16px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.08);
      padding: 40px;
      width: 100%;
      max-width: 640px;
    }
    #drop-zone {
      border: 2px dashed #a0aec0;
      border-radius: 12px;
      padding: 48px 24px;
      text-align: center;
      cursor: pointer;
      transition: all 0.2s;
      background: #f7fafc;
    }
    #drop-zone:hover, #drop-zone.drag-over {
      border-color: #4299e1;
      background: #ebf8ff;
    }
    #drop-zone .icon { font-size: 3rem; margin-bottom: 12px; }
    #drop-zone p { color: #718096; font-size: 0.95rem; }
    #drop-zone strong { color: #2d3748; }
    #file-input { display: none; }
    #file-info {
      display: none;
      margin-top: 16px;
      padding: 12px 16px;
      background: #ebf8ff;
      border-radius: 8px;
      color: #2b6cb0;
      font-size: 0.9rem;
      align-items: center;
      gap: 8px;
    }
    #process-btn {
      display: none;
      width: 100%;
      margin-top: 20px;
      padding: 14px;
      background: #3182ce;
      color: white;
      border: none;
      border-radius: 10px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
    }
    #process-btn:hover { background: #2b6cb0; }
    #process-btn:disabled { background: #a0aec0; cursor: not-allowed; }
    #progress {
      display: none;
      margin-top: 20px;
      text-align: center;
      color: #718096;
    }
    .spinner {
      width: 36px; height: 36px;
      border: 4px solid #e2e8f0;
      border-top-color: #3182ce;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto 12px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    #report { display: none; margin-top: 28px; }
    #report h2 {
      font-size: 1.1rem; color: #2d3748;
      margin-bottom: 16px;
      border-bottom: 2px solid #e2e8f0;
      padding-bottom: 8px;
    }
    .report-grid {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 10px;
      margin-bottom: 16px;
    }
    .report-item {
      background: #f7fafc; border-radius: 8px;
      padding: 12px; text-align: center;
    }
    .report-item .label { font-size: 0.78rem; color: #718096; margin-bottom: 4px; }
    .report-item .value { font-size: 1.2rem; font-weight: 700; color: #2d3748; }
    .report-item.highlight { background: #ebf8ff; }
    .report-item.highlight .value { color: #2b6cb0; }
    .category-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 8px;
      margin-bottom: 16px;
    }
    .cat-item { border-radius: 6px; padding: 8px; text-align: center; font-size: 0.8rem; }
    .cat-item .cat-label { font-size: 0.7rem; opacity: 0.8; }
    .cat-item .cat-val { font-weight: 700; font-size: 1rem; }
    .validation { padding: 10px 16px; border-radius: 8px; font-size: 0.88rem; font-weight: 600; }
    .validation.pass { background: #c6f6d5; color: #276749; }
    .validation.fail { background: #fed7d7; color: #9b2c2c; }
    #download-btn {
      display: none;
      width: 100%;
      margin-top: 20px;
      padding: 14px;
      background: #38a169;
      color: white;
      border: none;
      border-radius: 10px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
    }
    #download-btn:hover { background: #2f855a; }
    #error-box {
      display: none;
      margin-top: 16px;
      padding: 12px 16px;
      background: #fed7d7;
      border-radius: 8px;
      color: #c53030;
      font-size: 0.9rem;
    }
  </style>
</head>
<body>

  <div class="lang-bar">
    <button class="lang-btn active" onclick="setLang('zh')">中文</button>
    <button class="lang-btn" onclick="setLang('en')">EN</button>
  </div>

  <h1 data-zh="🔬 GC-MS FID 成分分類工具" data-en="🔬 GC-MS FID Classifier">🔬 GC-MS FID 成分分類工具</h1>
  <p class="subtitle"
     data-zh="上傳 Shimadzu GC-MS 輸出的 xlsx，自動分類並加總 C8-16 成分"
     data-en="Upload a Shimadzu GC-MS xlsx — auto-classify and summarize C8-16 components">
    上傳 Shimadzu GC-MS 輸出的 xlsx，自動分類並加總 C8-16 成分
  </p>

  <div class="card">
    <div id="drop-zone">
      <div class="icon">📂</div>
      <p>
        <strong data-zh="點擊選擇檔案" data-en="Click to select file">點擊選擇檔案</strong>
        <span data-zh="或拖曳到這裡" data-en=" or drag &amp; drop here">或拖曳到這裡</span>
      </p>
      <p style="margin-top:6px;"
         data-zh="僅接受 .xlsx 格式"
         data-en="Only .xlsx files accepted">僅接受 .xlsx 格式</p>
    </div>
    <input type="file" id="file-input" accept=".xlsx">

    <div id="file-info"></div>

    <button id="process-btn"
            data-zh="開始分類"
            data-en="Start Classification"
            onclick="processFile()">開始分類</button>

    <div id="progress">
      <div class="spinner"></div>
      <p data-zh="處理中，請稍候…" data-en="Processing, please wait…">處理中，請稍候…</p>
    </div>

    <div id="error-box"></div>

    <div id="report">
      <h2 data-zh="📊 驗證報告" data-en="📊 Validation Report">📊 驗證報告</h2>
      <div class="report-grid">
        <div class="report-item">
          <div class="label">C8-</div>
          <div class="value" id="r-c8m">—</div>
        </div>
        <div class="report-item highlight">
          <div class="label" data-zh="C8-16 總計" data-en="C8-16 Total">C8-16 總計</div>
          <div class="value" id="r-c816">—</div>
        </div>
        <div class="report-item">
          <div class="label">C16+</div>
          <div class="value" id="r-c16p">—</div>
        </div>
      </div>

      <div class="category-grid">
        <div class="cat-item" style="background:#92D050;color:#1a3a0a;">
          <div class="cat-label">Aromatic</div>
          <div class="cat-val" id="r-aro">—</div>
        </div>
        <div class="cat-item" style="background:#C5B0D5;color:#2d1a4a;">
          <div class="cat-label">Polyaromatic</div>
          <div class="cat-val" id="r-poly">—</div>
        </div>
        <div class="cat-item" style="background:#FF8C00;color:#fff;">
          <div class="cat-label">n-alkane</div>
          <div class="cat-val" id="r-nalk">—</div>
        </div>
        <div class="cat-item" style="background:#FF6600;color:#fff;">
          <div class="cat-label">iso-alkane</div>
          <div class="cat-val" id="r-iso">—</div>
        </div>
        <div class="cat-item" style="background:#FFD700;color:#3a2a00;">
          <div class="cat-label">cyclic</div>
          <div class="cat-val" id="r-cyc">—</div>
        </div>
        <div class="cat-item" style="background:#ADD8E6;color:#0a2a3a;">
          <div class="cat-label">Alkene</div>
          <div class="cat-val" id="r-alk">—</div>
        </div>
        <div class="cat-item" style="background:#FA8072;color:#3a0a0a;">
          <div class="cat-label">others</div>
          <div class="cat-val" id="r-oth">—</div>
        </div>
        <div class="cat-item" style="background:#e2e8f0;color:#2d3748;">
          <div class="cat-label">i/n ratio</div>
          <div class="cat-val" id="r-in">—</div>
        </div>
      </div>

      <div id="validation-box" class="validation">—</div>
    </div>

    <button id="download-btn"
            data-zh="⬇️ 下載分類完成的 xlsx（含驗證報告）"
            data-en="⬇️ Download classified xlsx (with validation report)">
      ⬇️ 下載分類完成的 xlsx（含驗證報告）
    </button>
  </div>

  <script>
    var selectedFile = null;
    var resultBlob   = null;
    var resultName   = '';
    var currentLang  = 'zh';

    var i18n = {
      zh: {
        fileSelected: function(name, size) { return '📄 <span><strong>' + name + '</strong> (' + size + ' KB)</span>'; },
        validationPass: function(err, auto) { return '✅ 加總驗證通過（誤差 ' + err + '）｜自動補分類 ' + auto + ' 個峰'; },
        validationFail: function(err) { return '❌ 加總有差異（誤差 ' + err + '），請手動確認'; },
        errorNoFile: '沒有收到檔案',
        errorFormat: '只接受 .xlsx 檔案',
        errorServer: '伺服器錯誤',
      },
      en: {
        fileSelected: function(name, size) { return '📄 <span><strong>' + name + '</strong> (' + size + ' KB)</span>'; },
        validationPass: function(err, auto) { return '✅ Validation passed (error ' + err + ') | Auto-classified ' + auto + ' peaks'; },
        validationFail: function(err) { return '❌ Sum mismatch (error ' + err + '), please check manually'; },
        errorNoFile: 'No file received',
        errorFormat: 'Only .xlsx files are accepted',
        errorServer: 'Server error',
      }
    };

    function setLang(lang) {
      currentLang = lang;
      document.querySelectorAll('.lang-btn').forEach(function(b) { b.classList.remove('active'); });
      document.querySelector('.lang-btn[onclick="setLang(\'' + lang + '\')"]').classList.add('active');
      document.querySelectorAll('[data-zh]').forEach(function(el) {
        var val = el.getAttribute('data-' + lang);
        if (val) el.textContent = val;
      });
      document.documentElement.lang = lang === 'zh' ? 'zh-TW' : 'en';
    }

    function showError(msg) {
      var box = document.getElementById('error-box');
      box.textContent = msg;
      box.style.display = 'block';
    }

    // Drop zone click
    document.getElementById('drop-zone').addEventListener('click', function() {
      document.getElementById('file-input').click();
    });

    // Drag & Drop
    var dropZone = document.getElementById('drop-zone');
    dropZone.addEventListener('dragover', function(e) { e.preventDefault(); dropZone.classList.add('drag-over'); });
    dropZone.addEventListener('dragleave', function() { dropZone.classList.remove('drag-over'); });
    dropZone.addEventListener('drop', function(e) {
      e.preventDefault();
      dropZone.classList.remove('drag-over');
      var file = e.dataTransfer.files[0];
      if (file) window.setFile(file);
    });

    // File input change – use polling fallback for robustness
    var fileInput = document.getElementById('file-input');
    fileInput.addEventListener('change', function(e) {
      if (e.target.files[0]) window.setFile(e.target.files[0]);
    });
    // Polling fallback: detect file selected even without change event
    fileInput.addEventListener('click', function() {
      var before = fileInput.files.length;
      var poll = setInterval(function() {
        if (fileInput.files.length !== before || fileInput.files.length > 0) {
          clearInterval(poll);
          if (fileInput.files[0]) window.setFile(fileInput.files[0]);
        }
      }, 300);
      setTimeout(function() { clearInterval(poll); }, 30000);
    });

    window.setFile = function(file) {
      if (!file.name.toLowerCase().endsWith('.xlsx')) {
        showError(i18n[currentLang].errorFormat);
        return;
      }
      selectedFile = file;
      var info = document.getElementById('file-info');
      info.style.display = 'flex';
      info.innerHTML = i18n[currentLang].fileSelected(file.name, (file.size/1024).toFixed(1));
      document.getElementById('process-btn').style.display = 'block';
      document.getElementById('report').style.display      = 'none';
      document.getElementById('download-btn').style.display = 'none';
      document.getElementById('error-box').style.display   = 'none';
    };

    window.processFile = function() {
      if (!selectedFile) return;

      document.getElementById('process-btn').disabled       = true;
      document.getElementById('progress').style.display     = 'block';
      document.getElementById('report').style.display       = 'none';
      document.getElementById('error-box').style.display    = 'none';
      document.getElementById('download-btn').style.display = 'none';

      var formData = new FormData();
      formData.append('file', selectedFile);

      fetch('/classify', { method: 'POST', body: formData })
        .then(function(res) {
          if (!res.ok) {
            return res.json().then(function(err) { throw new Error(err.error || i18n[currentLang].errorServer); });
          }
          // Read headers
          var c8m   = res.headers.get('X-C8minus')   || '—';
          var c816  = res.headers.get('X-C816total')  || '—';
          var c16p  = res.headers.get('X-C16plus')    || '—';
          var grand = res.headers.get('X-GrandTotal') || '—';
          var pass  = res.headers.get('X-Passed')     || 'False';
          var auto  = res.headers.get('X-AutoClass')  || '0';
          var aro   = res.headers.get('X-Aromatic')     || '—';
          var poly  = res.headers.get('X-Polyaromatic') || '—';
          var nalk  = res.headers.get('X-Nalkane')      || '—';
          var iso   = res.headers.get('X-Isoalkane')    || '—';
          var cyc   = res.headers.get('X-Cyclic')       || '—';
          var alk   = res.headers.get('X-Alkene')       || '—';
          var oth   = res.headers.get('X-Others')       || '—';
          var inr   = res.headers.get('X-InRatio')      || '—';

          document.getElementById('r-c8m').textContent  = c8m  + '%';
          document.getElementById('r-c816').textContent = c816 + '%';
          document.getElementById('r-c16p').textContent = c16p + '%';
          document.getElementById('r-aro').textContent  = aro  !== '—' ? aro  + '%' : '—';
          document.getElementById('r-poly').textContent = poly !== '—' ? poly + '%' : '—';
          document.getElementById('r-nalk').textContent = nalk !== '—' ? nalk + '%' : '—';
          document.getElementById('r-iso').textContent  = iso  !== '—' ? iso  + '%' : '—';
          document.getElementById('r-cyc').textContent  = cyc  !== '—' ? cyc  + '%' : '—';
          document.getElementById('r-alk').textContent  = alk  !== '—' ? alk  + '%' : '—';
          document.getElementById('r-oth').textContent  = oth  !== '—' ? oth  + '%' : '—';
          document.getElementById('r-in').textContent   = inr;
          document.getElementById('r-aro').textContent  = aro  !== '—' ? aro  + '%' : '—';
          document.getElementById('r-poly').textContent = poly !== '—' ? poly + '%' : '—';
          document.getElementById('r-nalk').textContent = nalk !== '—' ? nalk + '%' : '—';
          document.getElementById('r-iso').textContent  = iso  !== '—' ? iso  + '%' : '—';
          document.getElementById('r-cyc').textContent  = cyc  !== '—' ? cyc  + '%' : '—';
          document.getElementById('r-alk').textContent  = alk  !== '—' ? alk  + '%' : '—';
          document.getElementById('r-oth').textContent  = oth  !== '—' ? oth  + '%' : '—';
          document.getElementById('r-in').textContent   = inr;

          var vbox = document.getElementById('validation-box');
          var err  = Math.abs(parseFloat(grand) - 100).toFixed(4);
          if (pass === 'True') {
            vbox.textContent = i18n[currentLang].validationPass(err, auto);
            vbox.className = 'validation pass';
          } else {
            vbox.textContent = i18n[currentLang].validationFail(err);
            vbox.className = 'validation fail';
          }

          document.getElementById('report').style.display = 'block';
          document.getElementById('progress').style.display = 'none';
          document.getElementById('process-btn').disabled = false;
          document.getElementById('download-btn').style.display = 'block';

          return res.blob();
        })
        .then(function(blob) {
          resultBlob = blob;
          var stem = selectedFile.name.replace('.xlsx', '');
          resultName = stem + '_分類.xlsx';
        })
        .catch(function(err) {
          document.getElementById('progress').style.display = 'none';
          document.getElementById('process-btn').disabled = false;
          showError(err.message || i18n[currentLang].errorServer);
        });
    };

    document.getElementById('download-btn').addEventListener('click', function() {
      if (!resultBlob) return;
      var url = URL.createObjectURL(resultBlob);
      var a   = document.createElement('a');
      a.href  = url;
      a.download = resultName;
      document.body.appendChild(a);
      a.click();
      setTimeout(function() { URL.revokeObjectURL(url); document.body.removeChild(a); }, 1000);
    });
  </script>
</body>
</html>
